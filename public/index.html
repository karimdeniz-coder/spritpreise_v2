<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>SpritTelfs – Aktuelle Spritpreise</title>
<meta name="theme-color" content="#080d18"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">⛽</div>
      <div class="brand-name">Sprit<b>Telfs</b></div>
    </div>
    <div class="topbar-actions">
      <div id="liveIndicator" class="live-pill">
        <span class="live-dot"></span><span class="live-label">LIVE</span>
      </div>
      <button id="refreshBtn" class="icon-btn" title="Aktualisieren">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button id="locateBtn" class="icon-btn" title="GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="Ort suchen — Telfs, Innsbruck, Imst…" autocomplete="off"/>
      <button id="searchClear" class="search-clear hidden">✕</button>
    </div>
    <div id="searchResults" class="search-results hidden"></div>
  </div>

  <div id="map"></div>

  <button id="panelFab" class="fab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    <span id="fabCount">–</span>
  </button>

  <div id="panel" class="panel">
    <div class="panel-drag" id="panelDrag">
      <div class="panel-pill"></div>
    </div>
    <div class="panel-peek-label" id="peekLabel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m18 15-6-6-6 6"/></svg>
      <span id="peekText">Liste anzeigen</span>
    </div>

    <div class="filter-section">
      <div class="filter-chips">
        <button class="fuel-chip active" data-fuel="super95">Super 95</button>
        <button class="fuel-chip active" data-fuel="diesel">Diesel</button>
        <button class="fuel-chip" data-fuel="gas">Erdgas</button>
      </div>
      <div class="filter-row2">
        <div class="sel-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
          <select id="sortSelect">
            <option value="price">Günstigste zuerst</option>
            <option value="distance">Nächste zuerst</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
        <div class="sel-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <select id="brandSelect"><option value="">Alle Marken</option></select>
        </div>
      </div>
      <div class="radius-wrap">
        <span class="radius-lbl">Radius</span>
        <input type="range" id="radiusSlider" min="5" max="80" value="30"/>
        <span class="radius-val"><span id="radiusValue">30</span> km</span>
      </div>
      <div class="filter-meta">
        <label class="toggle-wrap">
          <input type="checkbox" id="showClosed" checked/>
          <span class="tog"></span>
          <span>Geschlossene anzeigen</span>
        </label>
        <span id="lastUpdate" class="meta-time"></span>
      </div>
    </div>

    <div id="stationList" class="station-list"></div>
  </div>

  <div id="stationSheet" class="sheet">
    <div class="sheet-drag"><div class="panel-pill"></div></div>
    <button id="sheetClose" class="sheet-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div id="sheetContent"></div>
  </div>

  <div id="toast" class="toast hidden"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
