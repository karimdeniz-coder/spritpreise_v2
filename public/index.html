<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>SpritMap – Live Spritpreise</title>
<meta name="theme-color" content="#060b14"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- ══ ONBOARDING ══════════════════════════════════════════════════════ -->
  <div id="onboarding" class="onboarding hidden">
    <div class="ob-backdrop"></div>
    <div class="ob-card">
      <div class="ob-icon">⛽</div>
      <h1 class="ob-title">SpritMap</h1>
      <p class="ob-sub">Aktuelle Spritpreise in deiner Umgebung.<br>Wo wohnst du?</p>
      <div class="ob-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="obInput" type="text" placeholder="Wohnort eingeben… z.B. Telfs" autocomplete="off"/>
      </div>
      <div id="obResults" class="ob-results hidden"></div>
      <button class="ob-skip" id="obSkip">Überspringen</button>
    </div>
  </div>

  <!-- ══ TOP HUD ═════════════════════════════════════════════════════════ -->
  <div class="top-hud">
    <header class="topbar">
      <div class="brand">
        <div class="brand-orb">⛽</div>
        <div class="brand-text">
          <span class="brand-name">SpritMap</span>
          <span class="brand-loc" id="brandLoc">Telfs</span>
        </div>
      </div>
      <div class="hud-actions">
        <div id="liveChip" class="live-chip">
          <span class="live-dot"></span>
          <span class="live-text">LIVE</span>
        </div>
        <button id="refreshBtn" class="hud-btn" title="Aktualisieren">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button id="locateBtn" class="hud-btn" title="Mein Standort">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" opacity=".3"/></svg>
        </button>
        <button id="homeBtn" class="hud-btn" title="Heimatort ändern">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
      </div>
    </header>

    <div class="search-row">
      <div class="searchbox" id="searchbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" type="text" placeholder="Ort suchen…" autocomplete="off"/>
        <button id="searchClear" class="clear-btn hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="searchResults" class="search-dropdown hidden"></div>
    </div>
  </div>

  <!-- ══ MAP ════════════════════════════════════════════════════════════ -->
  <div id="map"></div>

  <!-- ══ REFRESH COUNTDOWN ══════════════════════════════════════════════ -->
  <div id="refreshChip" class="refresh-chip hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="refreshCountdown">5:00</span>
  </div>

  <!-- ══ FAB ════════════════════════════════════════════════════════════ -->
  <button id="fab" class="fab">
    <svg id="fabIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    <span id="fabCount">–</span>
  </button>

  <!-- ══ BOTTOM DRAWER ═══════════════════════════════════════════════════ -->
  <div id="drawer" class="drawer">
    <div class="drawer-handle" id="drawerHandle">
      <div class="handle-bar"></div>
      <div class="handle-label" id="handleLabel">Liste anzeigen</div>
    </div>

    <!-- Fuel selector -->
    <div class="fuel-bar">
      <button class="fuel-btn active" data-fuel="super95" style="--fc:#34d399">
        <span class="fb-dot"></span>Super 95
      </button>
      <button class="fuel-btn active" data-fuel="diesel" style="--fc:#fbbf24">
        <span class="fb-dot"></span>Diesel
      </button>
      <button class="fuel-btn" data-fuel="gas" style="--fc:#fb923c">
        <span class="fb-dot"></span>Erdgas
      </button>
    </div>

    <!-- Controls row -->
    <div class="controls-row">
      <div class="ctrl-select">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
        <select id="sortSelect">
          <option value="price">Günstigste zuerst</option>
          <option value="distance">Nächste zuerst</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="ctrl-select">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <select id="brandSelect"><option value="">Alle Marken</option></select>
      </div>
    </div>

    <!-- Radius + toggle row -->
    <div class="radius-row">
      <span class="radius-lbl">Radius</span>
      <input type="range" id="radiusSlider" min="5" max="80" value="30"/>
      <span class="radius-val"><b id="radiusValue">30</b> km</span>
      <label class="tog-label">
        <input type="checkbox" id="showClosed" checked/>
        <span class="tog-track"><span class="tog-thumb"></span></span>
        <span class="tog-text">Geschlossen</span>
      </label>
    </div>

    <!-- Station list -->
    <div id="stationList" class="station-list"></div>
  </div>

  <!-- ══ STATION SHEET ═══════════════════════════════════════════════════ -->
  <div id="sheet" class="sheet">
    <div class="sheet-pill-wrap">
      <div class="handle-bar"></div>
    </div>
    <button id="sheetClose" class="sheet-close-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div id="sheetBody"></div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
